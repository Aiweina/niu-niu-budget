name: Update market quotes

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1-8 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-quotes.mjs
      - name: Commit updated quotes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/quotes.json
          git diff --cached --quiet || git commit -m "Update official market quotes"
          git push
